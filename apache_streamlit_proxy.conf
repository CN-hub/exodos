# Apache config para proxy reverso do Streamlit
# Salve este arquivo e inclua com: Include "c:/Users/CR8/Downloads/exodo/apache_streamlit_proxy.conf"
# Requisitos: modules mod_proxy e mod_proxy_http habilitados

<IfModule mod_proxy.c>
    ProxyPreserveHost On
    ProxyRequests Off

    # Encaminha /exodo para o Streamlit rodando em localhost:8501
    ProxyPass "/exodo/" "http://127.0.0.1:8501/"
    ProxyPassReverse "/exodo/" "http://127.0.0.1:8501/"

    # Ajustes úteis
    RequestHeader set X-Forwarded-Proto "https"
</IfModule>

# Observações:
# - Em XAMPP/Apache para Windows, habilite os módulos removendo os comentários em httpd.conf:
#   LoadModule proxy_module modules/mod_proxy.so
#   LoadModule proxy_http_module modules/mod_proxy_http.so
# - Reinicie o Apache após aplicar as mudanças.
# - Execute o Streamlit localmente: "streamlit run streamlit_app.py --server.port 8501 --server.address 127.0.0.1"
